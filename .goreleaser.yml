# .goreleaser.yml
# See https://goreleaser.com for documentation.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: .
    binary: council
    ldflags:
      - -s -w -X main.Version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - README.md
      - LICENSE
      - BUILD.md

nfpms:
  - maintainer: Ali Jamal <ali@example.com>
    description: AI Council Orchestrator for parallel multi-agent workflows.
    homepage: https://github.com/alijamal14/council
    license: MIT
    formats:
      - deb
      - rpm
    contents:
      - src: ./council
        dst: /usr/bin/council

brews:
  - name: council
    repository:
      owner: alijamal14
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/alijamal14/council"
    description: "AI Council Orchestrator for parallel multi-agent workflows."

scoops:
  - name: council
    repository:
      owner: alijamal14
      name: scoop-bucket
    homepage: "https://github.com/alijamal14/council"
    description: "AI Council Orchestrator"

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
